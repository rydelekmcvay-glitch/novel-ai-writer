services:
  - type: web
    name: novel-ai-writer
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        value: file:/data/app.db
    disk:
      name: novel-data
      mountPath: /data
      sizeGB: 1
