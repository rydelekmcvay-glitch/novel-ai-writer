# fly.toml - Fly.io deployment config
app = "novel-ai-writer-app"
primary_region = "sin"  # Singapore (close to China)

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  DATABASE_URL = "file:/data/app.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[[mounts]]
  source = "novel_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
